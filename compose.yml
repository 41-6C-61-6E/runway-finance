services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  finance-app:
    container_name: finance-app
    image: alanracek/personal-finance:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL}        # URL where login page and app are hosted
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}  # Admin set KEY used for authenticaiton

      #Not implemented yet
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

      # User defined
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}      # Admin set KEY used for passowrd resets and data recovery
      - REGISTRATION_PIN=${REGISTRATION_PIN}  # PIN needed to register a new account, set to empty string to disable new registration
      - FRED_API_KEY=${FRED_API_KEY}
      - RENTCAST_API_KEY=${RENTCAST_API_KEY}
      - BUG_REPORTING=${BUG_REPORTING:-false}


      # Optional: Auto-seed AI provider for all users (all 4 required to create a provider)
      - AI_PROVIDER_NAME=${AI_PROVIDER_NAME}        # Display name (e.g. "OpenAI", "Ollama")
      - AI_PROVIDER_ENDPOINT=${AI_PROVIDER_ENDPOINT} # Base URL (e.g. "https://api.openai.com/v1")
      - AI_PROVIDER_MODEL=${AI_PROVIDER_MODEL}      # Model identifier (e.g. "gpt-4o-mini")
      - AI_PROVIDER_API_KEY=${AI_PROVIDER_API_KEY}  # API key (encrypted per-user)

      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - NEXTAUTH_TRUST_HOST=true

      # File logging and rotation settings
      - LOG_FILE_PATH=/app/logs/finance.log
      - LOG_FILE_MAX_SIZE_MB=100
      - LOG_FILE_MAX_FILES=20

    volumes:
      - app-logs:/app/logs

    depends_on:
      - postgres

volumes:
  pgdata:
  app-logs:
