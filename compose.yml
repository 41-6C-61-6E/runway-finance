services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresdev
      POSTGRES_DB: runway_finance
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  next16-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3001:3000"
    environment:
      - NEXTAUTH_URL=http://10.1.1.10:3001
      - NEXTAUTH_SECRET=super-secret-key-for-dev-only-change-in-production
      - GOOGLE_CLIENT_ID=172398384702-vu31bbe5ojj8sdmppagk0quf4bl7ipa9.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=YOUR_GOOGLE_CLIENT_SECRET
      - NODE_ENV=production
      - NEXTAUTH_TRUST_HOST=true
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgresdev@postgres:5432/runway_finance
      - DEV_MODE=true
      - SYNC_CRON_SCHEDULE=0 */6 * * *
    depends_on:
      - postgres
    command: ["node", "server.js"]

volumes:
  pgdata:
