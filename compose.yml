services:
  postgres:
    image: postgres:16-alpine
    container_name: runway-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: runway_finance
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  runway-app:
    container_name: runway-app
    image: alanracek/runway-finance:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL}        # URL where login page and app are hosted
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}  # Admin set KEY used for authenticaiton

      #Not implemented yet
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

      # User defined
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}      # Admin set KEY used for passowrd resets and data recovery
      - REGISTRATION_PIN=${REGISTRATION_PIN}  # PIN needed to register a new account, set to empty string to disable new registration
      - FRED_API_KEY=${FRED_API_KEY}

      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - NEXTAUTH_TRUST_HOST=true
      - SYNC_CRON_SCHEDULE=0 */6 * * *

    depends_on:
      - postgres

volumes:
  pgdata:
