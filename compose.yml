services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: [REMOVED_DB_PASSWORD]
      POSTGRES_DB: runway_finance
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  next16-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3001:3000"
    environment:
      - NEXTAUTH_URL=http://10.1.1.10:3001
      - NEXTAUTH_SECRET=[REMOVED_NEXTAUTH_SECRET]
      - GOOGLE_CLIENT_ID=[REMOVED_GOOGLE_CLIENT_ID]
      - GOOGLE_CLIENT_SECRET=YOUR_GOOGLE_CLIENT_SECRET
      - NODE_ENV=production
      - NEXTAUTH_TRUST_HOST=true
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:[REMOVED_DB_PASSWORD]@postgres:5432/runway_finance
      - DEV_MODE=true
    depends_on:
      - postgres
    command: ["node", "server.js"]

volumes:
  pgdata:
